site_name: Evenwicht
site_description: Quantitative Methods from Foundations to Frontiers
site_author: B.B. Jansen
site_url: https://evenwicht.xyz/

repo_url: https://github.com/bbjansen/evenwicht
repo_name: bbjansen/evenwicht

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: STIX Two Text
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/scale-balance
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      separator: '[\s\-\.]+'
      lang: en
  - privacy:
      assets_exclude:
        - unpkg.com/mathjax@*/*
        - cdn.jsdelivr.net/npm/mathjax@*/*
  - meta
  - social:
      cards_layout: default
  - optimize
  - glightbox
  - git-revision-date-localized:
      enable_creation_date: true
      enable_git_follow: false
      type: date
      fallback_to_build_date: true
      strict: false

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.mark
  - pymdownx.smartsymbols:
      copyright: false
      registered: false
      trademark: false
  - pymdownx.keys
  - admonition
  - footnotes
  - tables
  - toc:
      permalink: "#"
      toc_depth: 3
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://d3js.org/d3.v7.min.js
  - javascripts/knowledge-graph.js
  - javascripts/mermaid-theme.js
  - javascripts/mermaid-lightbox.js

extra_css:
  - stylesheets/math.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bbjansen/evenwicht
    - icon: fontawesome/solid/file-pdf
      link: https://github.com/bbjansen/evenwicht/releases/latest/download/evenwicht.pdf
      name: Download PDF
  generator: false
copyright: Copyright &copy; 2025–2026 B.B. Jansen. Code licensed under AGPL-3.0. Documentation licensed under CC BY-NC 4.0.

